<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>FB Test</title></head>
<body>
<div id="out" style="font-family:monospace;font-size:13px;padding:20px;white-space:pre-wrap"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const log = s => { document.getElementById('out').textContent += s + '\n'; };

const app = initializeApp({
  apiKey: "AIzaSyCQVtvodBLUbbxXFUA1fxIOf1DgOdzjJS4",
  authDomain: "wavarchive-73dfb.firebaseapp.com",
  projectId: "wavarchive-73dfb",
  storageBucket: "wavarchive-73dfb.firebasestorage.app",
  messagingSenderId: "803800269262",
  appId: "1:803800269262:web:d274f1c0169b210a4b2b9f"
});
const auth = getAuth(app);
const db   = getFirestore(app);

log('1. Firebase init OK');

// Попробуй войти с реальным email/паролем
const EMAIL = 'sequrozxc@gmail.com';
const PASS  = '123123';

try {
  log('2. Signing in...');
  const cred = await signInWithEmailAndPassword(auth, EMAIL, PASS);
  log('3. Auth OK, uid=' + cred.user.uid);
  
  log('4. Writing to Firestore...');
  await setDoc(doc(db, 'users', cred.user.uid), {
    uid: cred.user.uid,
    email: EMAIL,
    test: true,
    ts: Date.now()
  });
  log('5. setDoc OK!');
  
  log('6. Reading back...');
  const snap = await getDoc(doc(db, 'users', cred.user.uid));
  log('7. getDoc OK, exists=' + snap.exists());
  log('Data: ' + JSON.stringify(snap.data()));
} catch(e) {
  log('ERROR: ' + e.code + ' — ' + e.message);
}
</script>
</body>
</html>
